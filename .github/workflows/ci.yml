name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - name: Validate public dataset
        run: go run ./cmd/providerbench validate data/results
